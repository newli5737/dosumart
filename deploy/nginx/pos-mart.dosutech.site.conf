# POS — pos-mart.dosutech.site
server {
    listen 443 ssl http2;
    server_name pos-mart.dosutech.site;

    ssl_certificate /etc/letsencrypt/live/mart.dosutech.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mart.dosutech.site/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /home/dosumart/apps/pos/dist;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

server {
    listen 80;
    server_name pos-mart.dosutech.site;
    return 301 https://$host$request_uri;
}
