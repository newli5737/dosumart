# API — api-mart.dosutech.site
upstream dosumart_api {
    server 127.0.0.1:3086;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name api-mart.dosutech.site;

    ssl_certificate /etc/letsencrypt/live/mart.dosutech.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mart.dosutech.site/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    location / {
        proxy_pass http://dosumart_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 90s;
    }
}

server {
    listen 80;
    server_name api-mart.dosutech.site;
    return 301 https://$host$request_uri;
}
